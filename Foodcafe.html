<html>
<head>
    <title>Food Cafe</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url(top-view-table-full-delicious-food-composition_23-2149141353.avif);
        }

        
        nav {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
        }

        nav h2 {
            color: rgb(213, 179, 100);
            margin: 0;
        }

        nav a {
            color: rgb(179, 46, 46);
            text-decoration: none;
            margin-left: 20px;
            font-size: 18px;
        }

        nav a:hover {
            color: orange;
        }

        
        .p1 {
            height: 100vh;
            background-image: url("./");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box {
            background: rgba(0,0,0,0.6);
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            color: rgb(48, 205, 61);
        }

        .box h1 {
            font-size: 40px;
        }

        .box p {
            font-size: 18px;
        }

        .box button {
            padding: 12px 25px;
            font-size: 16px;
            background: rgb(0, 17, 255);
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .box button:hover {
            background: rgb(255, 0, 0);
        }
    </style>
</head>

<body>

<nav>
    <h2>Food Cafe</h2>
    <div>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">Contact</a>
    </div>
</nav>

<div class="p1">
    <div class="box">
        <h1>Welcome to Food Cafe</h1>
        <p>Fresh food & tasty meals</p>
        <button>Order Now</button>
    </div>
</div>

</body>
</html>
