 <html>
    <head>
        <title> Navbar</title>
        <style>
            .nav{
                background-color: gray;
                padding: 10px;
                display: flex;
                list-style-type: none;
                gap: 22px;
                justify-content: right;
            }
            button{
                margin-top: 10px;
                padding: 10px;
                background-color: yellow;
                width: 200px;
                border: none;
                color:darkblue;
                border-radius: 5px;
            }
            button:hover{
                background-color: green;
            }
        </style>
    </head>
    <body>
        <div class="nav">
            <li><a href="https://www.alliance.edu.in/">Home</a></li>
            <li>Menu</li>
            <li>Services</li>
            <li>About</li>
        </div>
        <button>https://www.flipkart.com/</button>
    </body>
    </body>
</html>
