<html>
    <head>
        <title>Train Booking System</title>
    <style>
        h1{
            text-align: center;
            color: rgb(0, 0, 0);
        }
        body{
            text-align: center;
            padding-top: 20px;
        }
        fieldset{
            width: 500px;
            margin-left: 500px;
            background-color: rgb(5, 226, 241);
            color: black;
            border-radius: 5px;
            border: 1px solid black;
        }
        button{
            text-align: center;
            border-radius: 5px;
        }
    </style>
    </head>
    <body>
        <fieldset>
            <h1>Train Booking System</h1>
            <label> First Name: </label>
            <input type="text" placeholder="Enter First Name"><br><br>
            <label> Last Name: </label>
            <input type="text" placeholder="Enter Last Name"><br><br>
            <label> Gender: </label>
            <input type="text" placeholder="Enter your Gender"><br><br>
            <label> Source: </label>
            <input type="text" placeholder="Enter Source"><br><br>
            <label> Destination: </label>
            <input type="text" placeholder="Enter Destination"><br><br><br>
            <button>Submit</button>
        </fieldset>
    </body>
</html>
