<html>
    <head>
        <title>switch statements In JS</title>
    </head>
    <body>
        <h1>
            switch statements In JS
        </h1>
        <script>
            let month = Number(prompt("Enter your month:"))

            switch(month){
                case 1:
                    document.write("This month Jan")
                    break;

                    case 2:
                    document.write("This month Feb")
                    break;

                    case 3:
                        document.write("This month march")
                        break;

                    case 4:
                        document.write("This month april")
                        break;
                    
                    case 5:
                        document.write("This month may")
                        break;
                    
                    case 6:
                        document.write("This month june")
                        break;

                    case 7:
                        document.write("This month july")
                        break;

                    case 8:
                        document.write("This month August")
                        break;

                    case 9:
                        document.write("This month September")
                        break;
                    
                    case 10:
                        document.write("This month October")
                        break;

                    case 11:
                        document.write("This month November")
                        break;

                    case 12:
                        document.write("This month December")
                        break;


                    
                    default:
                        document.write("Dont know")
                    

            }
        </script>
        </html>
