<html>
    <head>
        <title>Calculator</title>
        <style>
            h1{
                text-align: center;
                background-color: aqua;

            }
            .parent{
                background-color: rgb(65, 23, 215);
                width: 100%;
                height: 50px;
                gap: 3px;
                display: grid;
                grid-template-columns: 10% 5% 50% 12% ;
            }
            
            div{
                
                background-color: rgb(178, 221, 227);
                text-align: center;
                line-height: -10px;

            }
        </style>
    </head>
    <body>
        <h1>Calculator</h1>
        <h2> CSS GRID</h2>

        <div class="parent">
            <div class="i"></div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
               

        </div>


    </body>
</html>
