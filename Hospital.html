<html>
<head>
<title>City Hospital</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
}


.navbar{
    background-color: #1158aa;
    padding:15px;
    color:white;
}

.navbar a{
    color:rgb(211, 218, 219);
    margin:15px;
    text-decoration:none;
    float:right;
    margin-top: -5px;
}


.hero{
    background-image:url("https://healthcaresnapshots.com/wp-content/uploads/sites/5/2022/05/monument-health-rapid-city-hospital.jpg");
    height:400px;
    background-size:cover;
    background-position:center;
    text-align:center;
    color:white;
    padding-top:120px;
}

button{
    padding:10px 20px;
    border:none;
    background:red;
    color:white;
    font-size:16px;
    cursor:pointer;
}


.services{
    text-align:center;
    padding:40px 0;
    background-color: #bad4f1;
}

.service-box{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:20px;

}

.service-box div{
    padding:15px 25px;
    background:#f2f2f2;
    border-radius:6px;
    font-weight:600;
}


.gallery{
    text-align:center;
    padding:40px 0;
    background-color: #bad4f1;
}

.gallery-container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    margin-top:20px;
}

.gallery-container img{
    width:160px;
    height:110px;
    object-fit:cover;
    border-radius:6px;
}

.nav-btn{
    border:none;
    background:#ccc;
    font-size:22px;
    padding:8px 12px;
    cursor:pointer;
    border-radius:50%;
}


.contact{
    text-align:center;
    padding:60px 0;
    background-color: #bad4f1;
}

.contact form{
    width:260px;
    margin:auto;
}

.contact input,
.contact textarea{
    width:100%;
    padding:8px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:4px;
}

.contact button{
    background:#e26b6b;
    border-radius:4px;
}


.footer{
    background-color: #1158aa;
    color:white;
    text-align:center;
    padding:12px;

    
}

</style>
</head>

<body>


<div class="navbar">
    <b>City Hospital</b>
    <a href="#">Contact</a>
    <a href="#">Gallery</a>
    <a href="#">Services</a>
    <a href="#">Home</a>
</div>


<div class="hero">
    <h1> We Care For Your Health</h1>
    <p>24/7 Emergency & Quality Services</p>
    <button>Book Appointment</button>
</div>


<section class="services">
    <h2>Our Services</h2>
    <div class="service-box">
        <div>Emergency Care</div>
        <div>Surgery</div>
        <div>Pharmacy</div>
    </div>
</section>


<section class="gallery">
    <h2>Hospital Gallery</h2>
    <div class="gallery-container">
        <button class="nav-btn">&#8249;</button>
        <img src="https://tse1.mm.bing.net/th/id/OIP.xyPSuULudWc2yHMzS6vTaAHaD5?pid=Api&P=0&h=180">
        <img src="https://www.chenmed.com/sites/default/files/2022-12/Your%202023%20Physician%20Survival%20Guide.jpg">
        <img src="https://wallpapers.com/images/hd/doctor-pictures-l5y1qs2998u7rf0x.jpg">
        <button class="nav-btn">&#8250;</button>
    </div>
</section>


<div class="contact">
    <h3>Contact Us</h3>
    <form>
        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="Email">
        <textarea rows="4" placeholder="Message"></textarea>
        <button type="submit">Send Message</button>
    </form>
</div>


<div class="footer">
    ©️ 2023 City Hospital | Designed by Student
</div>

</body>
</html>
